services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: codemind
      POSTGRES_PASSWORD: codemind
      POSTGRES_DB: codemind
    ports:
      - "5433:5432"
    volumes:
      - codemind_postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init-extensions.sql:/docker-entrypoint-initdb.d/init-extensions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codemind -d codemind"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  codemind_postgres_data:
