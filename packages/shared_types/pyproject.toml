[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "codemind-shared-types"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "sqlalchemy>=2.0",
    "pydantic>=2.6",
    "pgvector>=0.2.5",
]

[tool.setuptools.packages.find]
where = ["src"]
