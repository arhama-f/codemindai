name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start Postgres + Redis
        run: docker compose up -d --wait

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache Hugging Face model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-all-MiniLM-L6-v2

      - name: Install API + worker Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/shared_types -e packages/github_client \
                      -e packages/code_parser -e packages/ai_orchestrator \
                      -e packages/embedding_provider -e packages/analysis_engine
          (cd apps/api && pip install -r requirements-dev.txt -e .)
          (cd apps/worker && pip install -r requirements-dev.txt -e .)

      - name: Migrate codemind_e2e
        working-directory: apps/api
        env:
          ALEMBIC_DATABASE_URL: postgresql+psycopg2://codemind:codemind@localhost:5433/codemind_e2e
        run: alembic upgrade head

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run E2E suite
        env:
          CI: "true"
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14
